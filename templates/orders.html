{% extends "base.html" %}
{% block content %}

<section style="padding:50px">

<h2>📦 Orders Dashboard</h2>

<table border="1" cellpadding="10" style="width:100%; color:white; text-align:center;">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Phone</th>
    <th>Address</th>
    <th>City</th>
    <th>Pincode</th>
    <th>Payment</th>
    <th>Order</th>
</tr>

{% for o in data %}
<tr>
    <td>{{ o[0] }}</td>
    <td>{{ o[1] }}</td>
    <td>{{ o[2] }}</td>
    <td>{{ o[3] }}</td>
    <td>{{ o[4] }}</td>
    <td>{{ o[5] }}</td>
    <td>{{ o[6] }}</td>
    <td>{{ o[7] }}</td>
</tr>
{% endfor %}

</table>

</section>

{% endblock %}
