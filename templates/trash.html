{% extends "base.html" %}
{% block content %}

<h1 style="text-align:center;">🗑 Trash Products</h1>

<div class="grid">

{% for p in products %}
<div class="card">

    <img src="{{ url_for('static', filename='images/' ~ p[3]) }}" width="220">

    <h3>{{ p[1] }}</h3>
    <p>₹{{ p[2] }}</p>

    <a href="/restore/{{ p[0] }}">
        <button style="background:green;color:white;">
            Restore
        </button>
    </a>

    <a href="/permanent_delete/{{ p[0] }}">
        <button style="background:red;color:white;">
            Delete Forever
        </button>
    </a>

</div>
{% endfor %}

</div>

{% endblock %}
